<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var routes = new Set(['blog', 'projects'])
        var parts = location.pathname.split('/').filter(Boolean)
        var first = parts[0]
        var base = !first || routes.has(first) ? '/' : '/' + first + '/'
        var redirect = location.pathname + location.search + location.hash
        sessionStorage.setItem('gh-pages-redirect', redirect)
        location.replace(base)
      })()
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
